name: Staging List HeyGen Voices

# One-off diagnostic: list HeyGen voices filtered by language so we
# can pick neutral, educator-style defaults to seed the
# video-summary-voice-id-fr / -en platform settings. Reads
# HEYGEN_API_KEY from the staging container env (same key the
# Celery workers already use) so we don't need to surface the
# secret to the Actions runner.

on:
  workflow_dispatch:
    inputs:
      language:
        description: "Filter by language code (e.g. fr, en). Leave blank for all."
        required: false
        default: "fr"

jobs:
  list-voices:
    name: List HeyGen voices
    runs-on: ubuntu-latest
    steps:
      - name: SSH into staging and query HeyGen
        uses: appleboy/ssh-action@v1
        env:
          LANGUAGE: ${{ inputs.language }}
        with:
          host: 167.86.115.58
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: LANGUAGE
          script: |
            set -e
            cd ~/etutor
            echo "=============================================="
            echo "HeyGen /v2/voices — filter: language=$LANGUAGE"
            echo "=============================================="
            docker compose exec -T -e LANGUAGE="$LANGUAGE" backend \
              uv run python -c '
            import json, os, httpx
            from app.infrastructure.config.settings import get_settings

            key = get_settings().heygen_api_key
            assert key, "HEYGEN_API_KEY unset"

            r = httpx.get(
                "https://api.heygen.com/v2/voices",
                headers={"X-Api-Key": key, "Accept": "application/json"},
                timeout=30.0,
            )
            r.raise_for_status()
            data = r.json()
            voices = (data.get("data") or {}).get("voices") or data.get("voices") or []
            lang = os.environ.get("LANGUAGE", "").lower().strip()
            total = len(voices)

            def match(v):
                if not lang:
                    return True
                return (
                    v.get("language", "").lower() == lang
                    or v.get("locale", "").lower().startswith(lang)
                )

            filtered = [v for v in voices if match(v)]
            print(f"Total voices: {total}; filtered={len(filtered)}")
            print("-" * 90)
            for v in filtered[:40]:
                print(
                    f"  {v.get(\"voice_id\", \"\"):40s}  "
                    f"{(v.get(\"language\") or v.get(\"locale\") or \"\"):10s}  "
                    f"{v.get(\"gender\", \"\"):8s}  "
                    f"{v.get(\"name\", \"\")[:40]}"
                )
            if len(filtered) > 40:
                print(f"  ...({len(filtered) - 40} more)")
            '
