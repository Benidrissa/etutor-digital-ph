name: Claude — Queue Next Issue

on:
  pull_request:
    types: [closed]
    branches: [main, dev]

jobs:
  queue-next:
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'claude')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Find and trigger next issue
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const milestone = pr.milestone;

            if (!milestone) {
              console.log('No milestone on PR — skipping auto-queue.');
              return;
            }

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              milestone: milestone.number,
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 1,
            });

            if (issues.data.length === 0) {
              console.log(`All issues in milestone "${milestone.title}" are closed. Sprint complete!`);

              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                sort: 'due_on',
                direction: 'asc',
              });

              const currentDue = new Date(milestone.due_on);
              const nextMilestone = milestones.data.find(m => new Date(m.due_on) > currentDue);

              if (nextMilestone) {
                const nextIssues = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  milestone: nextMilestone.number,
                  state: 'open',
                  sort: 'created',
                  direction: 'asc',
                  per_page: 1,
                });

                if (nextIssues.data.length > 0) {
                  const next = nextIssues.data[0];
                  console.log(`Moving to next sprint: "${nextMilestone.title}" — triggering #${next.number}`);
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: next.number,
                    labels: ['claude'],
                  });
                }
              }
              return;
            }

            const nextIssue = issues.data[0];
            const hasLabel = nextIssue.labels.some(l => l.name === 'claude');
            if (hasLabel) {
              console.log(`Issue #${nextIssue.number} already has 'claude' label — skipping.`);
              return;
            }

            console.log(`Triggering Claude on next issue: #${nextIssue.number} — ${nextIssue.title}`);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: nextIssue.number,
              labels: ['claude'],
            });
