name: Claude Code Autonomous

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [labeled]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.label.name == 'claude' && github.event.issue.state == 'open')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git for push
        run: |
          git config user.name "claude[bot]"
          git config user.email "claude[bot]@users.noreply.github.com"
          git config push.autoSetupRemote true
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.PAT_TOKEN }}
          model: "claude-sonnet-4-20250514"
          trigger_phrase: "@claude"
          timeout_minutes: 360
          allowed_tools: |
            Bash
            Read
            Write
            Edit
            Glob
            Grep
          custom_instructions: |
            You are working on the SantePublique AOF e-learning platform.
            Read CLAUDE.md fully before any work.

            ## Skills — MUST READ before writing code

            IMPORTANT: Read and follow the skill files in .claude/skills/ before writing code:
            - Backend (backend/**): Read .claude/skills/fastapi-service/SKILL.md
            - React components (frontend/components/**): Read .claude/skills/react-components/SKILL.md
            - Next.js pages/layouts (frontend/app/**): Read .claude/skills/nextjs-app-router/SKILL.md
            - UI design decisions: Read .claude/skills/ui-design/SKILL.md
            - Tests (backend/tests/**, frontend/**/*.test.*): Read .claude/skills/testing/SKILL.md

            Always read the relevant skill file(s) BEFORE writing any code in that area.
            Multiple skills may apply (e.g. a new page needs both nextjs-app-router AND react-components).

            ## Key constraints (from skills)

            - Mobile-first: 320px minimum, 44×44px touch targets, <150KB JS bundle
            - Bilingual: ALL text via next-intl (FR/EN), never hardcode strings
            - Backend: async SQLAlchemy, Pydantic V2, structlog, Alembic for ALL migrations
            - Frontend: Tailwind + shadcn/ui ONLY, no other CSS or component libraries
            - AI: Claude API keys server-side only, SSE streaming for generated content
            - Every generated content must include sources_cited

            ## Git workflow — MANDATORY

            Git is already configured for push. You can git push and use gh CLI freely.

            CRITICAL: Your task is NOT complete until a PR exists. Follow ALL steps:

            STEP 1 — Branch from dev:
               git checkout dev && git pull origin dev && git checkout -b feature/issue-N-short-desc

            STEP 2 — Implement (read skills first, then code)

            STEP 3 — Lint and test:
               cd backend && uv run ruff check --fix . && uv run ruff format . && uv run pytest

            STEP 4 — Commit:
               git add -A && git commit -m "feat(scope): description (#N)"

            STEP 5 — Push:
               git push -u origin feature/issue-N-short-desc

            STEP 6 — Create PR (MANDATORY — do NOT skip this step):
               gh pr create --base dev --title "feat(scope): short description" --body "Closes #N"

            STEP 7 — Verify PR was created:
               gh pr list --head feature/issue-N-short-desc

            If step 6 fails, retry it. If push fails, retry it. The PR MUST exist when you finish.
            Do NOT merge the PR — the maintainer reviews and merges.
            Do NOT just comment on the issue without creating a PR.
