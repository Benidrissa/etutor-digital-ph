name: Claude Code Autonomous

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [labeled]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.label.name == 'claude' && github.event.issue.state == 'open')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git for push
        run: |
          git config user.name "claude[bot]"
          git config user.email "claude[bot]@users.noreply.github.com"
          git config push.autoSetupRemote true
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.PAT_TOKEN }}
          model: "claude-sonnet-4-20250514"
          trigger_phrase: "@claude"
          timeout_minutes: 360
          allowed_tools: |
            Bash
            Read
            Write
            Edit
            Glob
            Grep
          custom_instructions: |
            You are working on the SantePublique AOF e-learning platform.
            Read CLAUDE.md fully before any work.

            ## Skills — MUST READ before writing code

            IMPORTANT: Read and follow the skill files in .claude/skills/ before writing code:
            - Backend (backend/**): Read .claude/skills/fastapi-service/SKILL.md
            - React components (frontend/components/**): Read .claude/skills/react-components/SKILL.md
            - Next.js pages/layouts (frontend/app/**): Read .claude/skills/nextjs-app-router/SKILL.md
            - UI design decisions: Read .claude/skills/ui-design/SKILL.md
            - Tests (backend/tests/**, frontend/**/*.test.*): Read .claude/skills/testing/SKILL.md

            Always read the relevant skill file(s) BEFORE writing any code in that area.
            Multiple skills may apply (e.g. a new page needs both nextjs-app-router AND react-components).

            ## Key constraints (from skills)

            - Mobile-first: 320px minimum, 44×44px touch targets, <150KB JS bundle
            - Bilingual: ALL text via next-intl (FR/EN), never hardcode strings
            - Backend: async SQLAlchemy, Pydantic V2, structlog, Alembic for ALL migrations
            - Frontend: Tailwind + shadcn/ui ONLY, no other CSS or component libraries
            - AI: Claude API keys server-side only, SSE streaming for generated content
            - Every generated content must include sources_cited

            ## Git workflow

            IMPORTANT: Git is already configured for push. You can git push and use gh CLI freely.

            When implementing a story:
            1. Create a feature branch from dev:
               git checkout dev && git pull origin dev
               git checkout -b feature/issue-N-short-description
            2. Read relevant docs in docs/ and skills in .claude/skills/ before writing code
            3. Implement in phases: domain model → service layer → API routes → frontend → tests
            4. Run lint and tests before committing:
               cd backend && uv run ruff check . && uv run pytest
               cd frontend && npm run lint && npm run build
            5. Commit your work:
               git add -A && git commit -m "feat(scope): description (#N)"
            6. Push the branch:
               git push -u origin feature/issue-N-short-description
            7. Create a PR targeting 'dev'. CRITICAL: the PR body MUST contain "Closes #N"
               where N is the issue number, so the issue auto-closes on merge:
               gh pr create --base dev --title "feat(scope): description" --body "Closes #N

               ## Summary
               - bullet points of what changed

               ## Test plan
               - [ ] how to verify"
            8. Do NOT merge the PR — the maintainer will review and merge locally.

            You MUST push your branch and create the PR. Do not just comment on the issue.
