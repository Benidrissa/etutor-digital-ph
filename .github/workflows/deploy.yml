name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/benidrissa/etutor-digital-ph/backend
  FRONTEND_IMAGE: ghcr.io/benidrissa/etutor-digital-ph/frontend

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: santepublique_aof_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
      - name: Backend lint & test
        working-directory: backend
        run: |
          uv sync
          uv run ruff check .
          uv run ruff format --check .
          uv run pytest --cov --cov-fail-under=40
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/santepublique_aof_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: test

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend lint & build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image: ghcr.io/benidrissa/etutor-digital-ph/backend
          - service: frontend
            context: ./frontend
            image: ghcr.io/benidrissa/etutor-digital-ph/frontend
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push backend
        if: matrix.service == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max

      - name: Build and push frontend
        if: matrix.service == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Rsync compose file
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 167.86.115.58 >> ~/.ssh/known_hosts
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            docker-compose.prod.yml \
            deploy@167.86.115.58:~/etutor/docker-compose.yml

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && missing="$missing ANTHROPIC_API_KEY"
          [ -z "${{ secrets.OPENAI_API_KEY }}" ] && missing="$missing OPENAI_API_KEY"
          [ -z "${{ secrets.GOOGLE_API_KEY }}" ] && missing="$missing GOOGLE_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          SMS_RELAY_API_KEY: ${{ secrets.SMS_RELAY_API_KEY }}
          SMS_RELAY_TRUSTED_SENDERS: ${{ secrets.SMS_RELAY_TRUSTED_SENDERS }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: 167.86.115.58
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: POSTGRES_PASSWORD,ANTHROPIC_API_KEY,OPENAI_API_KEY,GOOGLE_API_KEY,SENTRY_DSN,NEXT_PUBLIC_SENTRY_DSN,NEXT_PUBLIC_POSTHOG_KEY,NEXT_PUBLIC_POSTHOG_HOST,SMS_RELAY_API_KEY,SMS_RELAY_TRUSTED_SENDERS,MINIO_ACCESS_KEY,MINIO_SECRET_KEY,DEPLOY_SHA
          script: |
            set -e
            cd ~/etutor

            # Write .env
            cat > .env << EOF
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            GOOGLE_API_KEY=${GOOGLE_API_KEY}
            SENTRY_DSN=${SENTRY_DSN}
            NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
            NEXT_PUBLIC_POSTHOG_KEY=${NEXT_PUBLIC_POSTHOG_KEY}
            NEXT_PUBLIC_POSTHOG_HOST=${NEXT_PUBLIC_POSTHOG_HOST}
            SMS_RELAY_API_KEY=${SMS_RELAY_API_KEY}
            SMS_RELAY_TRUSTED_SENDERS=${SMS_RELAY_TRUSTED_SENDERS}
            MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
            MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
            EOF

            # Pull new images (only changed layers transferred)
            docker compose pull backend frontend

            # Restart services
            docker compose up -d

            # Run database migrations then restart backend to pick up schema changes
            sleep 10
            docker compose exec -T -e PYTHONPATH=/app backend uv run alembic upgrade head || echo "Migration warning (may already be applied)"
            docker compose up -d --force-recreate backend
            sleep 15

            # Record deploy SHA
            echo "${DEPLOY_SHA}" > .deploy-sha

            # Wait for services to be healthy
            sleep 15
            docker compose ps

            # Cleanup old images
            docker image prune -f
