name: Staging List HeyGen Avatars

# One-off diagnostic: list HeyGen avatars from /v2/avatars so we can
# pick a neutral stock avatar to seed ``video-summary-default-avatar-id``.
# Companion to staging-list-voices (#1861). Reads HEYGEN_API_KEY from
# the staging container env.

on:
  workflow_dispatch:
    inputs:
      query:
        description: "Substring filter on avatar name (case-insensitive). Leave blank for a broad sample."
        required: false
        default: ""

jobs:
  list-avatars:
    name: List HeyGen avatars
    runs-on: ubuntu-latest
    steps:
      - name: SSH into staging and query HeyGen
        uses: appleboy/ssh-action@v1
        env:
          QUERY: ${{ inputs.query }}
        with:
          host: 167.86.115.58
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: QUERY
          script: |
            set -e
            cd ~/etutor
            echo "=============================================="
            echo "HeyGen /v2/avatars — filter: query=$QUERY"
            echo "=============================================="
            cat > /tmp/list_avatars.py <<'PYEOF'
            import os, httpx, json

            key = os.environ.get("HEYGEN_API_KEY")
            assert key, "HEYGEN_API_KEY unset"

            r = httpx.get(
                "https://api.heygen.com/v2/avatars",
                headers={"X-Api-Key": key, "Accept": "application/json"},
                timeout=30.0,
            )
            r.raise_for_status()
            data = r.json()
            # HeyGen nests as data.avatars (and sometimes data.talking_photos)
            inner = data.get("data") or data
            avatars = inner.get("avatars") or data.get("avatars") or []
            q = os.environ.get("QUERY", "").lower().strip()
            total = len(avatars)

            # Dump one raw avatar so we can see the shape (fields
            # differ subtly vs /v2/voices).
            if avatars:
                print("SAMPLE RAW AVATAR (first):")
                print(json.dumps(avatars[0], indent=2)[:600])
                print("---")

            def match(a):
                if not q:
                    return True
                name = str(a.get("avatar_name") or a.get("name") or "").lower()
                return q in name

            filtered = [a for a in avatars if match(a)]
            print(f"Total avatars: {total}; filtered={len(filtered)}")
            print("-" * 100)
            for a in filtered[:50]:
                aid = str(a.get("avatar_id") or a.get("id") or "")
                name = str(a.get("avatar_name") or a.get("name") or "")[:40]
                gender = str(a.get("gender", ""))
                preview = str(a.get("preview_image_url") or "")[:60]
                print(f"  {aid:40s}  {gender:8s}  {name:40s}  {preview}")
            if len(filtered) > 50:
                print(f"  ...({len(filtered) - 50} more)")
            PYEOF
            docker cp /tmp/list_avatars.py etutor-backend:/tmp/list_avatars.py
            docker compose exec -T -e QUERY="$QUERY" backend \
              uv run python /tmp/list_avatars.py
