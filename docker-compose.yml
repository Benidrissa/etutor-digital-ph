services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: santepublique-postgres
    environment:
      POSTGRES_DB: santepublique_aof
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: santepublique-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mms-tts:
    build:
      context: ./infrastructure/mms-tts
      dockerfile: Dockerfile
    container_name: santepublique-mms-tts
    ports:
      - "5050:5050"
    volumes:
      - mms_models:/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5050/health"]
      interval: 30s
      timeout: 5s
      start_period: 180s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G

  # Shared multi-tenant translation service. Translates French qbank text
  # into mos/dyu/bam/ful before MMS TTS synthesizes audio (#1690, rewritten
  # on CT2 int8 pruned artifact in #1709). The artifact is a vocab-pruned
  # NLLB-200-distilled-600M restricted to fra/mos/dyu/bam/fuv — ~600 MB RAM
  # vs the original ~2.4 GB, and 3–6s/translation on CPU vs the old ~30s.
  nllb:
    build:
      context: ./infrastructure/nllb
      dockerfile: Dockerfile
      args:
        NLLB_ARTIFACT_RELEASE_REPO: ${NLLB_ARTIFACT_RELEASE_REPO:-Benidrissa/sira-nllb-distill}
        NLLB_ARTIFACT_RELEASE_TAG: ${NLLB_ARTIFACT_RELEASE_TAG:-v1.0.0}
    container_name: santepublique-nllb
    ports:
      - "5060:5060"
    # No nllb_models volume anymore: the artifact is baked into the image at
    # build time (see Dockerfile), so there's nothing stateful to persist.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5060/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s  # CT2 loads from disk in seconds, not minutes
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: santepublique-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/santepublique_aof
      DATABASE_URL_SYNC: postgresql://postgres:postgres@postgres:5432/santepublique_aof
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      CORS_ORIGINS: http://localhost:3000
      MMS_TTS_URL: http://mms-tts:5050
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  pgdata:
  redisdata:
  uploads_data:
  mms_models:
  # nllb_models removed in #1709 — CT2 int8 artifact is baked into the image
