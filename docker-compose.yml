services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: santepublique-postgres
    environment:
      POSTGRES_DB: santepublique_aof
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: santepublique-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mms-tts:
    build:
      context: ./infrastructure/mms-tts
      dockerfile: Dockerfile
    container_name: santepublique-mms-tts
    ports:
      - "5050:5050"
    volumes:
      - mms_models:/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5050/health"]
      interval: 30s
      timeout: 5s
      start_period: 180s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G

  # Shared multi-tenant translation service (#1694) — one container serves
  # every tenant. Drives qbank question-text translation from fr → mos/dyu/bam
  # before TTS synthesis so driving-school audio is real Moore/Dyula/Bambara,
  # not French phonemes played by a local-language voice.
  nllb:
    build:
      context: ./infrastructure/nllb
      dockerfile: Dockerfile
    container_name: santepublique-nllb
    ports:
      - "8001:8000"
    volumes:
      - nllb_models:/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 300s  # first boot downloads the 600M model (~2 min)
      retries: 3
    deploy:
      resources:
        limits:
          memory: 3G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: santepublique-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/santepublique_aof
      DATABASE_URL_SYNC: postgresql://postgres:postgres@postgres:5432/santepublique_aof
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      CORS_ORIGINS: http://localhost:3000
      MMS_TTS_URL: http://mms-tts:5050
      NLLB_URL: http://nllb:8000
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  pgdata:
  redisdata:
  uploads_data:
  mms_models:
  nllb_models:
